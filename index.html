<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIT Interactive Quiz Platform</title>

<link rel="stylesheet" href="style2.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

<div id="start-screen">
<h1>CIT Interactive Quiz Platform</h1>

<p>Test your knowledge and challenge yourself.</p>

<label>Select Category</label>

<select id="category-select">
<option value="Tech">Tech</option>
<option value="Non-Tech">Non-Tech</option>
<option value="Guest">Guest</option>
<option value="Funny">Funny</option>
</select>

<button id="start-button">Start Quiz</button>
</div>


<div id="quiz-screen" class="hidden">

<div class="header">

<div class="number-of-questions">
Question <span id="question-number">1</span>/5
</div>

</div>

<h2 id="question-text"></h2>

<div id="options-container"></div>

<button id="next-button">Next Question</button>

</div>


<div id="results-screen" class="hidden">

<h2>Quiz Completed</h2>

<p>Your Score:
<span id="final-score"></span>/5
</p>

<input
type="text"
id="enter_player_name"
placeholder="Enter your name"
maxlength="15"
>

<div class="button-container">

<button class="btn btn-submit">
Submit
</button>

<button class="btn btn-back">
Go Back
</button>

</div>

</div>


<div id="leaderboard-modal" class="hidden">

<h2>Leaderboard</h2>

<ol id="leaderboard-list"></ol>

<button id="close-leaderboard-btn">
Close
</button>

</div>

</div>

<audio id="correct-sound" src="correct.mp3"></audio>
<audio id="wrong-sound" src="wrong.mp3"></audio>
<audio id="background-music"
src="quiz-background-loop-thinking-news-275636.mp3"
loop>
</audio>

<script src="quizz.js"></script>

</body>
</html>
